<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StoQ-room</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1' y='1' width='30' height='30' rx='7' fill='%23d3b78e'/%3E%3Cg transform='translate(4 4) scale(1)'%3E%3Cpath d='M12 2.6l8.5 4.4v9.9L12 21.4 3.5 16.9V7L12 2.6z' fill='%23c89a6a' stroke='%237a4e28' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cpath d='M3.6 7L12 11.4 20.4 7' stroke='%237a4e28' stroke-width='1.5' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M12 11.4V21.4' stroke='%237a4e28' stroke-width='1.5' stroke-linejoin='round' fill='none'/%3E%3C/g%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="root"></div>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel (transpila o JSX direto no navegador — sem etapa de build) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script src="supabaseConfig.js"></script>
<script>
  // Carrega e transpila o app.js manualmente (em vez de usar data-presets,
  // que não aceita opções como "runtime: classic" via atributo HTML).
  fetch('app.js')
    .then(function (r) { return r.text(); })
    .then(function (code) {
      var output = Babel.transform(code, {
        presets: [["react", { runtime: "classic" }]]
      }).code;
      var script = document.createElement('script');
      script.text = output;
      document.body.appendChild(script);
    })
    .catch(function (err) {
      console.error('Erro ao carregar app.js:', err);
    });
</script>

</body>
</html>
